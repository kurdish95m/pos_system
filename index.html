<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>تسجيل الدخول - Mobile POS</title>
    <link rel="stylesheet" href="css/style.css">
	
	<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#34495e">
</head>
<body class="login-body">

    <div class="login-box">
        <div style="font-size: 50px; margin-bottom: 10px;">🏪</div>
        <h2>نظام الكاشير</h2>
        
        <input type="text" id="username" placeholder="اسم المستخدم (مثال: admin)">
        <input type="password" id="password" placeholder="كلمة المرور (مثال: 1234)">
        
        <button id="login-btn" onclick="performLogin()">تسجيل الدخول</button>
        
        <p id="error"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        // تنظيف أي تسجيل دخول سابق عند فتح هذه الصفحة
        localStorage.clear();

        async function performLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("error");
            const btn = document.getElementById("login-btn");

            if(!user || !pass){
                errorMsg.innerText = "الرجاء إدخال اسم المستخدم وكلمة المرور!";
                return;
            }

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            // التحقق من قاعدة البيانات (جدول users)
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', user)
                .eq('password_hash', pass)
                .single(); // نجلب مستخدم واحد فقط

            if (error || !data) {
                errorMsg.innerText = "اسم المستخدم أو كلمة المرور غير صحيحة!";
                btn.innerText = "تسجيل الدخول";
                btn.disabled = false;
            } else {
                // تسجيل الدخول ناجح: حفظ البيانات للـ POS
                localStorage.setItem("login", "true");
                localStorage.setItem("user_id", data.id); // حفظ ID الموظف
                localStorage.setItem("username", data.username);
                localStorage.setItem("user_role", data.role);

                // التوجيه فوراً لشاشة الكاشير
                window.location.href = "pos.html";
            }
        }
    </script>
</body>
</html>
