<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>تسجيل الدخول - Mobile POS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Tajawal', sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#34495e">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center">
            <div class="text-6xl mb-4">🏪</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-6 flex items-center justify-center gap-2">
                <i class="fas fa-cash-register text-blue-600"></i> نظام الكاشير
            </h2>
        </div>

        <div class="space-y-4">
            <!-- حقل اسم المستخدم مع أيقونة -->
            <div class="relative">
                <i class="fas fa-user absolute text-gray-400 right-3 top-1/2 transform -translate-y-1/2"></i>
                <input type="text" id="username" placeholder="اسم المستخدم (مثال: admin)"
                       class="w-full pr-10 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-right">
            </div>
            
            <!-- حقل كلمة المرور مع أيقونة القفل وأيقونة العين لإظهار/إخفاء -->
            <div class="relative">
                <i class="fas fa-lock absolute text-gray-400 right-3 top-1/2 transform -translate-y-1/2"></i>
                <i class="fas fa-eye absolute text-gray-400 left-3 top-1/2 transform -translate-y-1/2 cursor-pointer hover:text-blue-600 transition" id="togglePassword"></i>
                <input type="password" id="password" placeholder="كلمة المرور (مثال: 1234)"
                       class="w-full pr-10 pl-10 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-right">
            </div>
            
            <!-- رابط الحساب التجريبي بشكل محسن وجذاب -->
            <div class="flex justify-center mt-2">
                <button onclick="fillDemo()" 
                        class="bg-blue-50 hover:bg-blue-100 text-blue-700 font-medium py-2 px-4 rounded-full transition duration-200 flex items-center gap-2 border border-blue-200 shadow-sm">
                    <i class="fas fa-magic text-blue-500"></i>
                    <span>حساب تجريبي: admin / 1234</span>
                    <i class="fas fa-arrow-left text-blue-500 text-sm"></i>
                </button>
            </div>
            
            <button id="login-btn" onclick="performLogin()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 transform hover:scale-105 flex items-center justify-center gap-2 mt-4">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
            
            <p id="error" class="text-red-500 text-sm text-center mt-2"></p>
        </div>
    </div>

    <!-- السكريبتات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        // تنظيف أي جلسة سابقة
        localStorage.clear();

        // دالة لملء بيانات الحساب التجريبي
        function fillDemo() {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = '1234';
            document.getElementById('username').focus();
        }

        // دالة إظهار/إخفاء كلمة المرور
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            // تبديل نوع الحقل بين password و text
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // تبديل شكل الأيقونة
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        async function performLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("error");
            const btn = document.getElementById("login-btn");

            if(!user || !pass){
                errorMsg.innerText = "الرجاء إدخال اسم المستخدم وكلمة المرور!";
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
            btn.disabled = true;

            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', user)
                .eq('password_hash', pass)
                .single();

            if (error || !data) {
                errorMsg.innerText = "اسم المستخدم أو كلمة المرور غير صحيحة!";
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
                btn.disabled = false;
            } else {
                localStorage.setItem("login", "true");
                localStorage.setItem("user_id", data.id);
                localStorage.setItem("username", data.username);
                localStorage.setItem("user_role", data.role);

                window.location.href = "pos.html";
            }
        }
    </script>
</body>
</html>
