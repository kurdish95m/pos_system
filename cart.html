<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>سلة المشتريات - Mobile POS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تخصيص بسيط للاتجاه RTL -->
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .bottom-nav a { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <!-- الهيدر -->
    <header class="flex justify-between items-center px-5 py-3 bg-[#2c3e50] text-white shadow-md">
        <div class="flex items-center gap-3">
            <span onclick="window.location.href='pos.html'" class="text-2xl cursor-pointer hover:opacity-80 transition">⬅️</span>
            <h2 class="text-lg font-semibold">🛒 سلة المشتريات</h2>
        </div>
    </header>

    <!-- حاوية السلة -->
    <div class="max-w-[600px] mx-auto mt-5 bg-white rounded-2xl p-5 shadow-lg">
        <!-- رأس السلة -->
        <div class="flex justify-between items-center border-b-2 border-gray-100 pb-4 mb-4">
            <h2 class="text-xl font-bold text-gray-800">المنتجات المضافة</h2>
            <button onclick="window.location.href='pos.html'" class="text-2xl text-red-500 hover:text-red-700 transition">✖</button>
        </div>

        <!-- قائمة المنتجات -->
        <div id="cart-items-list" class="space-y-3 max-h-[45vh] overflow-y-auto mb-4">
            <!-- سيتم تعبئتها بواسطة JavaScript -->
        </div>

        <!-- إجمالي السلة -->
        <div class="flex justify-between items-center text-xl font-bold mt-4 pt-4 border-t-2 border-dashed border-gray-300">
            <span>الإجمالي:</span>
            <span>د.ع <span id="total-price">0.00</span></span>
        </div>

        <!-- أزرار الإجراءات -->
        <button class="checkout-btn w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl mt-4 transition" id="checkout-btn" onclick="checkout()">✅ إتمام الطلب</button>
        <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl mt-3 transition" onclick="window.location.href='pos.html'">🔙 متابعة التسوق</button>
        <button class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl mt-3 transition" onclick="clearCart()">🗑️ تفريغ السلة</button>
        <button class="w-full bg-gray-700 hover:bg-gray-800 text-white font-bold py-4 rounded-xl mt-3 transition" id="print-btn" onclick="printLastReceipt()" style="display:none;">🖨️ طباعة الفاتورة</button>
    </div>

    <!-- القائمة السفلية (Bottom Navigation) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center py-2 px-4 text-xs shadow-lg">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-600 hover:text-blue-600 transition">
            <span class="text-xl">🏠</span>
            <span class="mt-1">الرئيسية</span>
        </a>
        <a href="pos.html" class="flex flex-col items-center text-blue-600 font-bold">
            <span class="text-xl">📱</span>
            <span class="mt-1">نقطة البيع</span>
        </a>
        <a href="orders.html" class="flex flex-col items-center text-gray-600 hover:text-blue-600 transition">
            <span class="text-xl">🧾</span>
            <span class="mt-1">الطلبات</span>
        </a>
        <a href="reports.html" class="flex flex-col items-center text-gray-600 hover:text-blue-600 transition">
            <span class="text-xl">📊</span>
            <span class="mt-1">التقارير</span>
        </a>
    </nav>

    <!-- تضمين السكريبتات الخارجية -->
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/UserManager.js"></script>
    <script src="js/alert.js"></script>
    <script src="js/utils.js"></script>

    <script>
        // استيراد بيانات السلة من localStorage
        let cartItems = JSON.parse(localStorage.getItem('pos_cart')) || [];
        let lastPrintedOrder = JSON.parse(localStorage.getItem('last_printed_order')) || null;

        // دوال مساعدة (إذا لم تكن موجودة في utils.js)
        window.formatCurrency = window.formatCurrency || function(value) {
            return parseFloat(value).toFixed(2);
        };
        window.formatCurrencyPrice = window.formatCurrencyPrice || function(value) {
            return parseFloat(value).toFixed(2);
        };

        function saveCartAndRender() {
            localStorage.setItem('pos_cart', JSON.stringify(cartItems));
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items-list');
            const totalSpan = document.getElementById('total-price');
            container.innerHTML = '';
            let total = 0;

            if (cartItems.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-6">السلة فارغة</p>';
                document.getElementById('checkout-btn').style.display = 'none';
                document.getElementById('print-btn').style.display = lastPrintedOrder ? 'block' : 'none';
                totalSpan.innerText = '0.00';
                return;
            }

            cartItems.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const div = document.createElement('div');
                div.className = 'flex flex-wrap items-center gap-2 p-3 border-b border-gray-100 last:border-0';
                div.innerHTML = `
                    <div class="flex-1 min-w-[120px]">
                        <h4 class="font-semibold text-gray-800">${item.name}</h4>
                        <p class="text-xs text-gray-500">${item.stock ? 'متوفر: ' + item.stock : ''}</p>
                    </div>
                    <input type="number" class="w-[70px] p-2 border border-gray-300 rounded-lg text-center font-bold text-red-500" value="${item.quantity}" min="1" data-index="${index}" data-field="quantity" onchange="updateItem(this)">
                    <input type="number" class="w-[70px] p-2 border border-gray-300 rounded-lg text-center font-bold text-green-600" value="${item.price}" min="0" step="0.01" data-index="${index}" data-field="price" onchange="updateItem(this)">
                    <div class="w-[70px] p-2 border border-gray-300 rounded-lg text-center font-bold bg-gray-50">${formatCurrency(itemTotal)}</div>
                    <button class="text-red-500 hover:text-red-700 text-xl" onclick="removeItem(${index})" title="حذف">❌</button>
                `;
                container.appendChild(div);
            });

            totalSpan.innerText = formatCurrency(total);
            document.getElementById('checkout-btn').style.display = 'block';
            document.getElementById('print-btn').style.display = lastPrintedOrder ? 'block' : 'none';
        }

        window.updateItem = function(inputElement) {
            const index = inputElement.dataset.index;
            const field = inputElement.dataset.field;
            const newValue = parseFloat(inputElement.value);

            if (isNaN(newValue) || newValue < 0) {
                alert('الرجاء إدخال قيمة صحيحة');
                inputElement.value = cartItems[index][field];
                return;
            }

            if (field === 'price') {
                cartItems[index].price = newValue;
            } else if (field === 'quantity') {
                if (newValue < 1) {
                    alert('الكمية يجب أن تكون 1 على الأقل');
                    inputElement.value = cartItems[index].quantity;
                    return;
                }
                if (cartItems[index].stock && newValue > cartItems[index].stock) {
                    alert('الكمية المطلوبة تتجاوز المتوفر في المخزن');
                    inputElement.value = cartItems[index].quantity;
                    return;
                }
                cartItems[index].quantity = newValue;
            }

            saveCartAndRender();
        };

        window.removeItem = function(index) {
            cartItems.splice(index, 1);
            saveCartAndRender();
        };

        window.clearCart = function() {
            if (cartItems.length === 0) return;
            if (confirm('هل أنت متأكد من تفريغ السلة؟')) {
                cartItems = [];
                localStorage.removeItem('pos_cart');
                renderCart();
            }
        };

        async function checkout() {
            if (cartItems.length === 0) {
                alert("السلة فارغة!");
                return;
            }

            const btn = document.getElementById('checkout-btn');
            btn.innerText = "جاري إرسال الطلب...";
            btn.disabled = true;

            const total = cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const customerId = localStorage.getItem('selected_customer_id') || null;
            const customerName = localStorage.getItem('selected_customer_name') || "زبون نقدي";
            const userId = localStorage.getItem("user_id");
            const username = localStorage.getItem("username") || "غير معروف";

            const orderPayload = { 
                total_amount: total,
                user_id: userId ? parseInt(userId) : null 
            };
            if (customerId) orderPayload.customer_id = parseInt(customerId);

            const { data: orderData, error: orderError } = await supabaseClient.from('orders').insert([orderPayload]).select();
            if (orderError) {
                alert("حدث خطأ أثناء إنشاء الفاتورة.");
                btn.innerText = "✅ إتمام الطلب";
                btn.disabled = false;
                return;
            }

            const orderId = orderData[0].id;

            const orderItemsData = cartItems.map(item => ({
                order_id: orderId,
                product_id: item.id,
                quantity: item.quantity,
                price_at_time: item.price
            }));
            const { error: itemsError } = await supabaseClient.from('order_items').insert(orderItemsData);
            if (itemsError) {
                alert("فشل إضافة المنتجات للفاتورة.");
                return;
            }

            lastPrintedOrder = {
                id: orderId,
                date: new Date().toLocaleString('ar-EG'),
                customer: customerName,
                cashier: username,
                total: total,
                items: cartItems
            };
            localStorage.setItem('last_printed_order', JSON.stringify(lastPrintedOrder));

            cartItems = [];
            localStorage.removeItem('pos_cart');

            renderCart();

            alert(`تم إنشاء الفاتورة رقم #${orderId} بنجاح!`);
            btn.innerText = "✅ إتمام الطلب";
            btn.disabled = false;
            document.getElementById('print-btn').style.display = 'block';
        }

        function printLastReceipt() {
            if (!lastPrintedOrder) return;
            const printContent = `
                <html>
                <head>
                    <title>طباعة فاتورة #${lastPrintedOrder.id}</title>
                    <style>
                        @page { margin: 0; }
                        body { font-family: 'Courier New', monospace; width: 72mm; margin: 0 auto; padding: 10px 0; color: #000; font-size: 12px; direction: rtl; }
                        .header { text-align: center; margin-bottom: 10px; }
                        .header h2 { margin: 0; font-size: 18px; }
                        .header p { margin: 3px 0; font-size: 12px; }
                        .divider { border-top: 1px dashed #000; margin: 8px 0; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
                        th, td { text-align: right; padding: 4px 0; font-size: 12px; }
                        th { border-bottom: 1px dashed #000; }
                        .total-section { font-weight: bold; font-size: 14px; text-align: left; }
                        .footer { text-align: center; margin-top: 15px; font-size: 12px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h2>نظام نقاط البيع</h2>
                        <p>فاتورة: #${lastPrintedOrder.id}</p>
                        <p>العميل: ${lastPrintedOrder.customer}</p>
                        <p>الكاشير: ${lastPrintedOrder.cashier}</p>
                        <p>التاريخ: ${lastPrintedOrder.date}</p>
                    </div>
                    <div class="divider"></div>
                    <table>
                        <tr><th style="width: 50%;">الصنف</th><th style="width: 20%; text-align:center;">كمية</th><th style="width: 30%;">السعر</th></tr>
                        ${lastPrintedOrder.items.map(i => `<tr><td>${i.name}</td><td style="text-align:center;">${i.quantity}</td><td>${formatCurrency(i.quantity * i.price)}</td></tr>`).join('')}
                    </table>
                    <div class="divider"></div>
                    <div class="total-section">الإجمالي: ${formatCurrency(lastPrintedOrder.total)}</div>
                    <div class="divider"></div>
                    <div class="footer"><p>شكراً لزيارتكم!</p></div>
                </body>
                </html>
            `;
            const printWindow = window.open('', '_blank', 'width=400,height=700');
            printWindow.document.write(printContent);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => { printWindow.print(); printWindow.close(); }, 500);
        }

        // بدء التشغيل
        renderCart();
    </script>
</body>
</html>
